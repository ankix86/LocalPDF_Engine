name: Documentation
description: Docs improvements (README, CONTRIBUTING, etc.)
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving the docs!

  - type: textarea
    id: change
    attributes:
      label: What needs updating?
      placeholder: "The README section about ... is outdated because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed wording / outline
      placeholder: "Suggested text: ..."

